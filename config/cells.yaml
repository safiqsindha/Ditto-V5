# v5 Cell Configuration
# One section per domain cell. All sample targets are upstream data targets
# (sized for ~1200 chains per cell after filtering loss).

cells:
  pubg:
    cell_id: "pubg"
    display_name: "PUBG (sample matches via PUBG developer API)"
    # Replaced Fortnite as the battle-royale cell after Epic CDN locked down
    # public chunk access. PUBG offers a documented public API with no rate
    # limit on /matches and telemetry endpoints.
    data_source: "pubg_developer_api"
    shard: "steam"
    time_range:
      start: "2026-04-01"
      end: "2026-12-31"
    sample_target_matches: 25
    stratification:
      - game_mode: "squad-fpp"
        fraction: 0.70
      - game_mode: "solo-fpp"
        fraction: 0.30
    env_vars:
      - PUBG_API_KEY
    mock_fallback: true
    parser: "telemetry_json"

  nba:
    cell_id: "nba"
    display_name: "NBA (2023-24)"
    data_source: "nba_stats_api"
    seasons: ["2023-24"]
    sample_target_games: 300
    stratification:
      - phase: "regular_season"
        fraction: 0.80
      - phase: "playoffs"
        fraction: 0.20
    env_vars: []
    mock_fallback: true
    tracking_data_available: false  # Second Spectrum not publicly accessible

  csgo:
    cell_id: "csgo"
    display_name: "CS:GO / CS2 (2024 S-tier)"
    data_source: "hltv_demo_archive"
    tournament_tiers: ["S-tier"]
    time_range:
      start: "2024-01-01"
      end: "2024-12-31"
    sample_target_maps: 150
    demo_format: "cs2"  # CS2 since August 2023; awpy handles both
    stratification:
      - event: "IEM_Katowice_2024"
        fraction: 0.33
      - event: "BLAST_Premier_2024"
        fraction: 0.34
      - event: "ESL_One_2024"
        fraction: 0.33
    env_vars: []
    mock_fallback: true
    parser: "awpy"

  rocket_league:
    cell_id: "rocket_league"
    display_name: "Rocket League (RLCS 2024)"
    data_source: "ballchasing_api"
    playlist_filter: "rlcs"
    time_range:
      start: "2024-01-01"
      end: "2024-12-31"
    sample_target_replays: 250
    stratification:
      - tier: "RLCS_World_Championship"
        fraction: 0.30
      - tier: "RLCS_Major"
        fraction: 0.40
      - tier: "RLCS_Regional"
        fraction: 0.30
    env_vars:
      - BALLCHASING_TOKEN
    mock_fallback: true
    parser: "rrrocket"

  poker:
    cell_id: "poker"
    display_name: "Poker (NLHE — HandHQ + WSOP 2023, all human)"
    # Per D-37: dropped Pluribus (Brown & Sandholm 2019) because Facebook's
    # superhuman bot occupies one of the 6 seats in every hand, contaminating
    # ~17% of actions with non-human decisions. Switched to HandHQ
    # (anonymised human cash games, 25NL–1000NL, July 2009) plus the 83
    # televised WSOP 2023 $50K Players Championship final-table hands.
    # HandHQ filtered to 6-handed hands at parse time to match the standard
    # 6-max cash format.
    data_source: "phh_dataset_v3"
    time_range:
      start: "2009-07-01"
      end: "2023-07-31"
    sample_target_games: 3500
    stratification:
      - subset: "wsop/2023"
        fraction: 0.025   # 83 elite human hands — included whole
      - subset: "handhq"
        fraction: 0.975
    env_vars: []
    mock_fallback: true
    parser: "tomli"
