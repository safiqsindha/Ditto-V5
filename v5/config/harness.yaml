# v5 Statistical Harness Configuration
# Adapted from v4 McNemar pipeline for five-cell parallel operation.
# Parameters marked [REQUIRES SIGN-OFF] must not be locked until SPEC is pre-registered.

harness:
  version: "1.1"
  cells: ["fortnite", "nba", "csgo", "rocket_league", "hearthstone"]

  mcnemar:
    alpha: 0.05
    continuity_correction: true
    two_sided: true
    bonferroni_divisor: 5  # [REQUIRES SIGN-OFF]: 5 (per-cell) vs 1 (aggregate only)
    min_discordant_pairs: 10

  scoring:
    correct_label: 1
    incorrect_label: 0
    abstain_label: -1  # chains where model produces no classifiable output

  variance:
    bootstrap_iterations: 10000
    bootstrap_seed: 42
    confidence_level: 0.95

  gate2:
    retention_floor: 0.50  # Gate 2: must retain >= 50% of chains after ACTIONABLE filter

  reporting:
    cell_level: true
    aggregate: true
    effect_size: true  # Cohen's h for proportions
    power_post_hoc: true

  chain_length:  # [REQUIRES SIGN-OFF]: fixed vs variable; if fixed, what length?
    mode: "TBD"
    # Candidate options: fixed_5, fixed_10, variable_3_to_15
    # Decision cannot be made until T design is reviewed

actionables:
  version: "1.1"
  amendments:
    - "ResourceBudget included in actionable types"
    - "phase_ prefix stripped before type comparison"
  gate2_floor: 0.50
